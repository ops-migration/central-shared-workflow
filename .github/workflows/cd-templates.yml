# github_shared_templates: .github/workflows/cd-templates.yml

name: Reusable CD - Deploy CloudFormation Stacks

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      stacks-path:
        required: false
        type: string
        default: 'iac/aws/us-east-1'
      commits-json:
        description: 'Raw JSON of github.event.commits from caller'
        required: true
        type: string
    secrets:
      github-token:
        required: true

jobs:
  deploy:
    name: Deploying CloudFormation Stacks
    runs-on:
      - codebuild-ecs-workflow-${{ github.run_id }}-${{ github.run_attempt }}

    permissions:
      contents: read
      id-token: none

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          token: ${{ secrets.github-token }}
          fetch-depth: 1

      - name: Detect and deploy changed stacks
        run: |
          # Parse changed YAML files from commits JSON
          CHANGED=$(echo '${{ inputs.commits-json }}' \
            | jq -r '[.[].added[], .[].modified[]] | .[]' \
            | grep "^${{ inputs.stacks-path }}/.*\.yaml$" \
            | tr '\n' ' ' \
            || true)

          echo "Changed files: $CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "ℹ️ No stack files changed — nothing to deploy"
            exit 0
          fi

          for f in $CHANGED; do
            if [ ! -f "$f" ]; then
              echo "⚠️  Skipping $f — file not found"
              continue
            fi

            filename=$(basename "$f" .yaml)
            stack_name="${{ inputs.environment }}-${filename}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Deploying: $f  →  Stack: $stack_name"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            aws cloudformation deploy \
              --template-file "$f" \
              --stack-name "$stack_name" \
              --region "us-east-1" \
              --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
              --no-fail-on-empty-changeset

            echo "✅ $stack_name deployed successfully"
          done

