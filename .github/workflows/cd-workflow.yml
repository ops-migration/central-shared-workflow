name: Reusable CD - Deploy to Amazon ECS

on:
  workflow_call:
    inputs:
      aws-region:
        description: 'AWS Region'
        required: false
        type: string
        default: 'us-east-1'
      ecs-cluster:
        description: 'ECS Cluster name'
        required: true
        type: string
      ecs-service:
        description: 'ECS Service name'
        required: true
        type: string
      cf-stack-name:
        description: 'CloudFormation Stack name'
        required: true
        type: string
      target-env:
        description: 'Target environment (dev/qa/stage/prod)'
        required: true
        type: string
      environment-name:
        description: 'GitHub Environment name for approval'
        required: true
        type: string
      environment-url:
        description: 'Environment URL'
        required: true
        type: string
      runner-label:
        description: 'Custom runner label pattern'
        required: false
        type: string
        default: 'codebuild-shared-workflow'

jobs:
  deploy:
    name: Deploy to ECS
    runs-on:
      - ${{ inputs.runner-label }}-${{ github.run_id }}-${{ github.run_attempt }}
    
    permissions:
      contents: read
      id-token: none
    
    outputs:
      docker-image-uri: ${{ steps.read-config.outputs.dockerImageUri }}
      commit-hash: ${{ steps.read-config.outputs.commitHash }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Read configuration
        id: read-config
        run: |
          echo "📖 Reading configuration from config.json"
          
          if [ ! -f config.json ]; then
            echo "❌ Error: config.json not found!!!"
            exit 1
          fi
          
          DOCKER_IMAGE_URI=$(jq -r '.docker_image_uri' config.json)
          COMMIT_HASH=$(jq -r '.commit_hash' config.json)
          
          if [ "$DOCKER_IMAGE_URI" == "null" ] || [ -z "$DOCKER_IMAGE_URI" ]; then
            echo "❌ Error: docker_image_uri is missing in config.json"
            exit 1
          fi
          
          if [ "$COMMIT_HASH" == "null" ] || [ -z "$COMMIT_HASH" ]; then
            echo "❌ Error: commit_hash is missing in config.json"
            exit 1
          fi
          
          echo "dockerImageUri=$DOCKER_IMAGE_URI" >> $GITHUB_OUTPUT
          echo "commitHash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          
          echo "✅ Configuration loaded successfully"
          echo "Docker Image URI: $DOCKER_IMAGE_URI"
          echo "Commit Hash: $COMMIT_HASH"
      
      - name: Update CloudFormation Stack
        id: update-stack
        run: |
          
          aws cloudformation deploy \
            --template-file iac/aws/us-east-1/stack.yaml \
            --stack-name "${{ inputs.cf-stack-name }}" \
            --region "${{ inputs.aws-region }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              DockerImageUri="${{ steps.read-config.outputs.dockerImageUri }}" \
              CommitHash="${{ steps.read-config.outputs.commitHash }}"
          
          echo "✅ CloudFormation stack updated successfully"
      
      
