AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Stack - Generic ECS Task Role (per service)

Parameters:
  Environment:
    Type: String
  AppName:
    Type: String
    Description: Service name (e.g. function-manager, acquiflow)

Resources:
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Environment}-${AppName}-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${Environment}-${AppName}-task-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowReadSecrets
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}-${AppName}*

              - Sid: AllowS3AccessToAppBucket
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${Environment}-${AppName}/*

              - Sid: AllowS3ListBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub arn:aws:s3:::${Environment}-${AppName}

              - Sid: AllowCloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: AppName
          Value: !Ref AppName
        - Key: ManagedBy
          Value: CloudFormation

# ── SSM Parameter Store ────────────────────────────────────────────────────
  SSMTaskRoleArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/iam/${AppName}/TaskRoleArn
      Type: String
      Value: !GetAtt ECSTaskRole.Arn
      Description: !Sub "[${Environment}] ECS Task Role ARN for ${AppName}"
      Tags:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ManagedBy: CloudFormation

Outputs:
  TaskRoleArn:
    Description: ECS Task Role ARN
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-TaskRoleArn
