#       Name: !Sub /cfn/${Environment}/vpc/PublicSubnet2Id
#       Type: String
#       Value: !Ref PublicSubnet2
#       Description: !Sub "[${Environment}] Public Subnet 2 ID"
#       Tags:
#         Environment: !Ref Environment
#         ManagedBy: CloudFormation

#   SSMPrivateSubnet1Id:
#     Type: AWS::SSM::Parameter
#     Properties:
#       Name: !Sub /cfn/${Environment}/vpc/PrivateSubnet1Id
#       Type: String
#       Value: !Ref PrivateSubnet1
#       Description: !Sub "[${Environment}] Private Subnet 1 ID"
#       Tags:
#         Environment: !Ref Environment
#         ManagedBy: CloudFormation

#   SSMPrivateSubnet2Id:
#     Type: AWS::SSM::Parameter
#     Properties:
#       Name: !Sub /cfn/${Environment}/vpc/PrivateSubnet2Id
#       Type: String
#       Value: !Ref PrivateSubnet2
#       Description: !Sub "[${Environment}] Private Subnet 2 ID"
#       Tags:
#         Environment: !Ref Environment
#         ManagedBy: CloudFormation

#   SSMInternetGatewayId:
#     Type: AWS::SSM::Parameter
#     Properties:
#       Name: !Sub /cfn/${Environment}/vpc/InternetGatewayId
#       Type: String
#       Value: !Ref InternetGateway
#       Description: !Sub "[${Environment}] Internet Gateway ID"
#       Tags:
#         Environment: !Ref Environment
#         ManagedBy: CloudFormation

#   SSMNatGatewayId:
#     Type: AWS::SSM::Parameter
#     Properties:
#       Name: !Sub /cfn/${Environment}/vpc/NatGatewayId
#       Type: String
#       Value: !Ref NatGateway
#       Description: !Sub "[${Environment}] NAT Gateway ID"
#       Tags:
#         Environment: !Ref Environment
#         ManagedBy: CloudFormation

#   SSMPublicRouteTableId:
#     Type: AWS::SSM::Parameter
#     Properties:
#       Name: !Sub /cfn/${Environment}/vpc/PublicRouteTableId
#       Type: String
#       Value: !Ref PublicRouteTable
#       Description: !Sub "[${Environment}] Public Route Table ID"
#       Tags:
#         Environment: !Ref Environment
#         ManagedBy: CloudFormation

#   SSMPrivateRouteTableId:
#     Type: AWS::SSM::Parameter
#     Properties:
#       Name: !Sub /cfn/${Environment}/vpc/PrivateRouteTableId
#       Type: String
#       Value: !Ref PrivateRouteTable
#       Description: !Sub "[${Environment}] Private Route Table ID"
